<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MudPies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* ── TUNABLE VARIABLES AT THE TOP ──────────────────────────── */
    /* Adjust these to control vertical spacing and scroll thresholds */

    /* 1. Page padding “breathing room” per section */
    :root {
      --cream:        #F5F0E8;
      --parchment:    #EDE5D4;
      --sand:         #D9C9A8;
      --clay:         #B8926A;
      --terracotta:   #A0614A;
      --umber:        #6B4A32;
      --bark:         #3E2A1A;
      --sage:         #8A9A7A;
      --moss:         #5C6E50;
      --fog:          rgba(62,42,26,0.08);

      /* Hero section vertical padding (top/bottom) */
      --hero-padding-v: 9vh;

      /* About section padding (top/bottom) */
      --about-padding-v: 8vh;

      /* Divider margin (top/bottom) */
      --divider-margin-v: 6vh;

      /* Pullquote section padding */
      --pullquote-padding-v: 7vh;

      /* Footer padding */
      --footer-padding-v: 3rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--bark);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* ── Nav ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 5vw;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245, 240, 232, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--fog);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--umber);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--umber);
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .nav-links a:hover { opacity: 1; }

    /* ── Hero ── (SIFT / sand‑dunes background) */
    .hero {
      /* Uses: images.wallpaperscraft.com sand dunes / stones */
      background: url('https://images.wallpaperscraft.com/image/single/sand_dunes_stones_1240621_1280x720.jpg') center/cover;
      padding: var(--hero-padding-v) 5vw;   /* ← Change spacing here */
      max-width: 1100px;
      margin: 0 auto;
      color: white;  /* white text on dark image */
      text-shadow: 0 0 8px rgba(0,0,0,0.5);
      animation: fadeUp 1.1s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 1.5rem;
      animation: fadeUp 1.1s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 6vw, 5.2rem);
      font-weight: 300;
      line-height: 1.08;
      letter-spacing: -0.01em;
      color: var(--bark);
      max-width: 780px;
      margin-bottom: 2rem;
      animation: fadeUp 1.1s 0.18s cubic-bezier(0.16,1,0.3,1) both;
    }

    h1 em {
      font-style: italic;
      color: var(--umber);
    }

    .lede {
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--umber);
      max-width: 500px;
      line-height: 1.85;
      margin-bottom: 3rem;
      animation: fadeUp 1.1s 0.26s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      animation: fadeUp 1.1s 0.34s cubic-bezier(0.16,1,0.3,1) both;
    }

    .btn-primary {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      background: var(--umber);
      color: var(--parchment);
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 60px;
      transition: background 0.35s, transform 0.2s;
    }

    .btn-primary:hover {
      background: var(--bark);
      transform: translateY(-1px);
    }

    .btn-ghost {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      background: transparent;
      color: var(--umber);
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 60px;
      border: 1px solid var(--clay);
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
    }

    .btn-ghost:hover {
      background: var(--fog);
      border-color: var(--umber);
      transform: translateY(-1px);
    }

    /* ── Divider ── (adjustable vertical margin) */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--sand), transparent);
      margin: var(--divider-margin-v) 5vw;
      opacity: 0.6;
    }

    /* ── Feature strip ── */
    .features {
      display: flex;
      gap: 0;
      padding: 3rem 5vw 4rem; /* ↑ increase if you want more scroll space after features */
      border-top: 1px solid var(--fog);
      border-bottom: 1px solid var(--fog);
      animation: fadeUp 1.2s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    .feature {
      flex: 1;
      padding: 2.2rem 2rem;
      border-right: 1px solid var(--fog);
    }

    .feature:last-child { border-right: none; }

    .feature-icon {
      width: 32px;
      height: 32px;
      margin-bottom: 1rem;
      color: var(--terracotta);
    }

    .feature h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--umber);
      margin-bottom: 0.4rem;
    }

    .feature p {
      font-size: 0.85rem;
      color: var(--clay);
      line-height: 1.7;
    }

    /* ── About section (HAND SCULPTED / zoomed in hand image) */
    #about {
      /* Uses: zoomed in, hand‑with‑clay style */
      background: url('https://images.unsplash.com/photo-1771523350747-638a89667c8f?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover;
      padding: var(--about-padding-v) 5vw;  /* ← Change spacing here */
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6vw;
      align-items: center;
      color: white;
      text-shadow: 0 0 8px rgba(0,0,0,0.6);
      /* Keep this section taller so scrolling is smoother */
      min-height: 110vh;  /* ← Control “how much scroll” this section takes */
    }

    .about-label {
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 1.2rem;
    }

    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 300;
      color: var(--bark);
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }

    .about-text {
      font-size: 1rem;
      color: var(--umber);
      line-height: 1.9;
    }

    /* ── Decorative swatch blob ── */
    .about-visual {
      position: relative;
      aspect-ratio: 3/4;
      border-radius: 48% 52% 44% 56% / 52% 44% 56% 48%;
      overflow: hidden;
    }

    .swatch-text {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--umber);
      opacity: 0.7;
      white-space: nowrap;
    }

    /* ── Pull quote (REFINED SOIL background) */
    .pullquote {
      /* Uses: refined soil / studio‑style clay */
      background: url('https://images.unsplash.com/photo-1690322679888-cc449aa1e0d9?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover;
      padding: var(--pullquote-padding-v) 5vw; /* ↑ adjust spacing */
      text-align: center;
      color: white;
      text-shadow: 0 0 8px rgba(0,0,0,0.6);
      border: none;
    }

    .pullquote blockquote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: 300;
      color: var(--bark);
      max-width: 680px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .pullquote cite {
      display: block;
      margin-top: 1.2rem;
      font-family: 'Jost', sans-serif;
      font-style: normal;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--clay);
    }

    /* ── Footer ── (adjustable vertical padding) */
    footer {
      padding: var(--footer-padding-v) 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--fog);
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--umber);
      opacity: 0.6;
    }

    .footer-note {
      font-size: 0.75rem;
      color: var(--clay);
      opacity: 0.7;
    }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      #about {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .about-visual {
        aspect-ratio: 4/3;
        order: -1;
      }

      .features {
        flex-direction: column;
      }

      .feature {
        border-right: none;
        border-bottom: 1px solid var(--fog);
      }

      .feature:last-child {
        border-bottom: none;
      }

      footer {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo" style="display:flex; align-items:center; gap:10px;">
      <img src="./logo.png" alt="Mudpies logo" style="width:1in; height:1in; object-fit:contain;">
      <span>Mudpies</span>
    </a>
    <ul class="nav-links">
      <li><a href="./index.html">Collection</a></li>
      <li><a href="./process.html">The Process</a></li>
      <li><a href="#about">About</a></li>
    </ul>
  </nav>

  <main>
    <!-- Hero: Soil / Earth intro (SIFT sand‑dunes background) -->
    <div class="hero" style="display:flex; align-items:center; justify-content:center; gap:6vw; max-width:1100px; margin:0 auto;">
      <!-- LEFT: TEXT -->
      <div style="flex:1; display:flex;
