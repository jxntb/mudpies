<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Process — MudPies</title>
  
  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&amp;family=Jost:wght@300;400&amp;display=swap" rel="stylesheet">
  
  <!-- GSAP for cinematic zoom-through effect -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  
  <style>
    :root {
      --cream: #F5F0E8;
      --bark: #3E2A1A;
      --umber: #6B4A32;
      --clay: #B8926A;
      --terracotta: #A0614A;
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      background-color: var(--bark);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      overflow-x: hidden;
    }

    /* Cinematic grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 100;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 5vw;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      background: linear-gradient(to bottom, rgba(62,42,26,0.8), transparent);
    }

    .nav-logo,
    .nav-links a {
      color: var(--cream);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.8rem;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    /* Viewport container for pinned cinematic sections */
    .viewport {
      height: 100vh;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .section {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
    }

    .bg-image {
      position: absolute;
      width: 120%;
      height: 120%;
      background-size: cover;
      background-position: center;
      filter: brightness(0.4) contrast(1.1) sepia(0.2);
      z-index: 1;
      transition: filter 0.4s ease;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    .content h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 300;
      margin-bottom: 1rem;
      font-style: italic;
    }

    .content p {
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.8;
      color: var(--clay);
    }

    /* Progress indicators */
    .progress-wrap {
      position: fixed;
      right: 5vw;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--cream);
      border-radius: 50%;
      opacity: 0.3;
      transition: all 0.3s ease;
    }

    /* Scroll prompt */
    .scroll-down {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.6;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      nav { padding: 1.5rem 4vw; }
      .nav-links { gap: 1.5rem; }
      .progress-wrap { right: 4vw; gap: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Mudpies Studio</a>
    <ul class="nav-links">
      <li><a href="index.html">Collection</a></li>
      <li><a href="process.html" style="border-bottom: 1px solid var(--cream);">The Process</a></li>
    </ul>
  </nav>

  <div class="scroll-down">Scroll to dig deeper</div>

  <div class="progress-wrap">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <main class="viewport">
    <!-- Stage 1: Extraction -->
    <section class="section" id="stage1">
      <div class="bg-image" style="background-image: url('https://images.unsplash.com/photo-1590133322383-217565bc9921?q=80&w=2070&auto=format&fit=crop');"></div>
      <div class="content">
        <p>I. Extraction</p>
        <h2>The Sift</h2>
      </div>
    </section>

    <!-- Stage 2: Hydration -->
    <section class="section" id="stage2">
      <div class="bg-image" style="background-image: url('https://images.unsplash.com/photo-1565191999001-551c187427bb?q=80&w=2070&auto=format&fit=crop');"></div>
      <div class="content">
        <p>II. Hydration</p>
        <h2>Living Earth</h2>
      </div>
    </section>

    <!-- Stage 3: Shaping -->
    <section class="section" id="stage3">
      <div class="bg-image" style="background-image: url('https://images.unsplash.com/photo-1459156260736-f07f53898101?q=80&w=2069&auto=format&fit=crop');"></div>
      <div class="content">
        <p>III. Composition</p>
        <h2>Hand Sculpted</h2>
      </div>
    </section>

    <!-- Stage 4: Final Object (Refined Soil) — handmade clay pottery image -->
    <section class="section" id="stage4">
      <div class="bg-image" style="background-image: url('https://images.unsplash.com/photo-1581783898377-6b2c3c2e0f2a?q=80&w=2070&auto=format&fit=crop');"></div>
      <div class="content">
        <p>IV. The Result</p>
        <h2>Refined Soil</h2>
        <br><br>
        <a href="index.html" class="nav-logo" style="border: 1px solid var(--cream); padding: 15px 30px; border-radius: 50px; display: inline-block;">Return to Collection</a>
      </div>
    </section>
  </main>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const sections = gsap.utils.toArray(".section");
    const dots = gsap.utils.toArray(".dot");
    const bgImages = gsap.utils.toArray(".bg-image");
    const numSections = sections.length;

    // Initial state for first section
    gsap.set(sections[0], { autoAlpha: 1, visibility: "visible" });
    gsap.set(dots[0], { opacity: 1, scale: 1.5 });

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: ".viewport",
        start: "top top",
        end: `+=${(numSections - 1) * 100}vh`,
        scrub: 1.5,
        pin: true,
        pinSpacing: true,
        snap: {
          snapTo: 1 / (numSections - 1),
          duration: 0.4,
          ease: "power1.inOut"
        }
      }
    });

    // Build timeline for each transition
    sections.forEach((section, i) => {
      if (i > 0) {
        const prevSection = sections[i - 1];
        const prevBg = prevSection.querySelector(".bg-image");
        const prevContent = prevSection.querySelector(".content");

        const position = i;

        // Zoom-in + fade previous background
        tl.to(prevBg, {
          scale: 4,
          opacity: 0,
          duration: 1.5,
          ease: "power2.in"
        }, position);

        // Zoom-out previous content
        tl.to(prevContent, {
          scale: 0.8,
          opacity: 0,
          duration: 1,
          ease: "power2.in"
        }, position);

        // Fade in current section
        tl.to(section, {
          autoAlpha: 1,
          visibility: "visible",
          duration: 1
        }, position + 0.5);

        // Update progress dots
        tl.to(dots[i - 1], { opacity: 0.3, scale: 1 }, position + 0.5);
        tl.to(dots[i], { opacity: 1, scale: 1.5 }, position + 0.5);
      }
    });

    // Subtle parallax on active background only
    let currentIndex = 0;
    window.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      
      if (bgImages[currentIndex]) {
        gsap.to(bgImages[currentIndex], { 
          x: x, 
          y: y, 
          duration: 1.2, 
          ease: "power2.out",
          overwrite: "auto"
        });
      }
    });

    // Track current section for parallax
    ScrollTrigger.create({
      trigger: ".viewport",
      start: "top top",
      end: "bottom bottom",
      onUpdate: (self) => {
        const progress = self.progress;
        currentIndex = Math.round(progress * (sections.length - 1));
      }
    });
  </script>
</body>
</html>
