<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MudPies — Process</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cream:#F5F0E8;
  --umber:#6B4A32;
  --bark:#3E2A1A;
  --fog:rgba(62,42,26,0.08);
}

body {
  font-family:'Jost', sans-serif;
  background:var(--cream);
  color:white;
  overflow-x:hidden;
}

/* NAV (same as index) */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:2rem 5vw;
  position:fixed;
  width:100%;
  top:0;
  z-index:20;
  background:rgba(245,240,232,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--fog);
}

.nav-logo {
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
}

.nav-logo img {
  width:50px;
  height:50px;
}

.nav-logo span {
  font-family:'Cormorant Garamond', serif;
  font-size:1.4rem;
  color:var(--umber);
}

.nav-links {
  display:flex;
  gap:2rem;
  list-style:none;
}

.nav-links a {
  text-decoration:none;
  font-size:0.75rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--umber);
  opacity:0.7;
}

/* PROCESS SECTIONS */
.section {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 5vw;
  position:relative;
}

/* background images */
.s1 { background:url('https://images.wallpaperscraft.com/image/single/sand_dunes_stones_1240621_1280x720.jpg') center/cover no-repeat; }
.s2 { background:url('https://w0.peakpx.com/wallpaper/13/373/HD-wallpaper-a-wonderful-canadian-lake-forest-sky-lake-mountains.jpg') center/cover no-repeat; }
.s3 { background:url('https://images.unsplash.com/photo-1771523350747-638a89667c8f?q=80&w=774&auto=format&fit=crop') center/cover no-repeat; }
.s4 { background:url('https://images.unsplash.com/photo-1690322679888-cc449aa1e0d9?q=80&w=1740&auto=format&fit=crop') center/cover no-repeat; }

/* dark overlay for readability */
.section::after {
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

/* centered text */
.content {
  position:relative;
  z-index:2;
}

h1 {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(2.5rem,5vw,4.5rem);
  font-weight:300;
  letter-spacing:0.05em;
}

/* subtle fade-in */
.fade {
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
}

.fade.visible {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<nav>
  <a href="./index.html" class="nav-logo">
    <img src="./logo.png" alt="logo">
    <span>Mudpies</span>
  </a>
  <ul class="nav-links">
    <li><a href="./index.html">Collection</a></li>
    <li><a href="./process.html">The Process</a></li>
  </ul>
</nav>

<main>

<section class="section s1">
  <div class="content fade">
    <h1>1. The Sift</h1>
  </div>
</section>

<section class="section s2">
  <div class="content fade">
    <h1>2. Breathing</h1>
  </div>
</section>

<section class="section s3">
  <div class="content fade">
    <h1>3. Hand Crafted</h1>
  </div>
</section>

<section class="section s4">
  <div class="content fade">
    <h1>4. Refined</h1>
  </div>
</section>

</main>

<script>
const els = document.querySelectorAll('.fade');

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
    }
  });
}, { threshold: 0.4 });

els.forEach(el => io.observe(el));
</script>

</body>
</html>
